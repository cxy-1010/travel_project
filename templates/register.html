{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TourNest 旅游预订平台</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; }
        .register-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
        .register-card h2 { text-align: center; margin-bottom: 8px; font-weight: 700; color: #333; }
        .register-card .subtitle { text-align: center; color: #999; margin-bottom: 28px; }
        .register-card .form-control { border-radius: 8px; padding: 12px 16px; border: 1px solid #e0e0e0; font-size: 15px; }
        .register-card .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
        .register-card .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; padding: 12px; font-size: 16px; font-weight: 600; width: 100%; }
        .register-card .btn-primary:hover { opacity: .9; }
        .register-card .error { background: #ffeaea; color: #e74c3c; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .register-card .links { text-align: center; margin-top: 20px; color: #999; }
        .register-card .links a { color: #667eea; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>创建账号</h2>
        <p class="subtitle">注册 TourNest 开启旅行之旅</p>
        {% if error %}
        <div class="error"><i class="fa fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" required placeholder="请输入用户名">
            </div>
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" name="email" placeholder="请输入邮箱（选填）">
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary"><i class="fa fa-user-plus"></i> 注册</button>
        </form>
        <div class="links">
            <p>已有账号？<a href="{% url 'login' %}">立即登录</a></p>
            <p class="mt-2"><a href="/">返回首页</a></p>
        </div>
    </div>
</body>
</html>
