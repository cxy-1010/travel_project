{% extends "base.html" %}
{% load static %}
{% block title %}个人中心 - TourNest{% endblock %}
{% block content %}
<section style="padding:150px 0 80px;background:#f9f9f9;">
    <div class="container">
        <div class="gallary-header text-center">
            <h2>个人中心</h2>
            <p>管理您的个人信息和偏好设置</p>
        </div>
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="single-package-item-txt" style="padding:40px;border:1px solid #eee;border-radius:5px;background:#fff;">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>用户名</label>
                                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>邮箱</label>
                                    <input type="email" name="email" class="form-control" value="{{ user.email }}">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>姓</label>
                                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>名</label>
                                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>手机号</label>
                            <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
                        </div>
                        <div class="form-group">
                            <label>个人简介</label>
                            <textarea name="bio" class="form-control" rows="3">{{ profile.bio }}</textarea>
                        </div>
                        <div class="form-group">
                            <label>头像URL</label>
                            <input type="text" name="avatar_url" class="form-control" value="{{ profile.avatar_url }}" placeholder="images/client/testimonial1.jpg">
                        </div>
                        <div class="form-group">
                            <label>偏好货币</label>
                            <select name="preferred_currency" class="form-control">
                                <option value="CNY" {% if profile.preferred_currency == 'CNY' %}selected{% endif %}>人民币 ¥</option>
                                <option value="USD" {% if profile.preferred_currency == 'USD' %}selected{% endif %}>美元 $</option>
                                <option value="EUR" {% if profile.preferred_currency == 'EUR' %}selected{% endif %}>欧元 €</option>
                            </select>
                        </div>
                        <button type="submit" class="about-view packages-btn">保存修改</button>
                        <a href="{% url 'my_bookings' %}" class="about-view" style="margin-left:10px;background:#999;">我的预订</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
