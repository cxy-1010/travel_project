{% load static %}
<!doctype html>
<html class="no-js" lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}TourNest 用户中心{% endblock %}</title>
        <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet" />
        <link rel="shortcut icon" type="image/icon" href="{% static 'logo/favicon.png' %}"/>
        <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}" />
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
        <link rel="stylesheet" href="{% static 'css/style.css' %}" />
        <link rel="stylesheet" href="{% static 'css/responsive.css' %}" />
        <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
    </head>
    <body class="{% block body_class %}auth-page{% endblock %}">
        <main class="auth-shell">
            <section class="{% block panel_class %}auth-panel{% endblock %}">
                <a class="auth-logo" href="{% url 'index' %}">tour<span>Nest</span></a>
                <p class="auth-kicker">{% block kicker %}{% endblock %}</p>
                <h1>{% block heading %}{% endblock %}</h1>

                {% if messages %}
                    <div class="auth-messages">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                {% block content %}{% endblock %}
            </section>
        </main>
    </body>
</html>
