{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>TourNest 酒店搜索</title>
	<link rel="shortcut icon" type="image/icon" href="{% static 'vendor/favicon.png' %}"/>
	<link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}" />
	<link rel="stylesheet" href="{% static 'css/hotel_search.css' %}" />
</head>
<body>
	<header class="hotel-topbar">
		<a class="brand-link" href="/">tour<span>Nest</span></a>
		<div class="top-search"><i class="fa fa-search"></i><input type="text" placeholder="搜索任何旅游相关"></div>
		<a class="home-link" href="/"><i class="fa fa-home"></i> 首页</a>
	</header>

	<section class="hotel-search-bar">
		<div class="field wide"><i class="fa fa-map-marker"></i><input id="hotel-city" type="text" placeholder="目的地"></div>
		<div class="field"><i class="fa fa-calendar"></i><input id="hotel-checkin" type="text" placeholder="入住日期"></div>
		<div class="field"><input id="hotel-checkout" type="text" placeholder="退房日期"></div>
		<div class="field"><i class="fa fa-user"></i><input id="hotel-guests" type="text" placeholder="1间, 1成人"></div>
		<div class="field wide"><input id="hotel-keyword" type="text" placeholder="位置/品牌/酒店 (选填)"></div>
		<button id="hotel-search-btn"><i class="fa fa-search"></i> 搜索</button>
	</section>

	<main class="hotel-layout">
		<aside class="filter-panel">
			<div class="map-preview">
				<iframe id="hotel-map" title="酒店地图" loading="lazy"></iframe>
				<button id="show-map-btn" type="button">在地图上展示</button>
			</div>

			<div class="filter-card">
				<h3>价格</h3>
				<div class="price-range">
					<span></span><span></span>
				</div>
				<div id="price-filters" class="chip-grid">
					<button data-price="0-300">¥0 - ¥300</button>
					<button data-price="300-600">¥300 - ¥600</button>
					<button data-price="600-1000">¥600 - ¥1000</button>
					<button data-price="1000-1600">¥1000 - ¥1600</button>
					<button data-price="1600-99999">¥1600+</button>
				</div>
			</div>

			<div class="filter-card">
				<h3>热门筛选</h3>
				<label><input type="checkbox" value="高评分"> 高评分</label>
				<label><input type="checkbox" value="地铁周边"> 地铁周边</label>
				<label><input type="checkbox" value="免费取消"> 免费取消</label>
				<label><input type="checkbox" value="亲子友好"> 亲子友好</label>
			</div>
		</aside>

		<section class="hotel-results">
			<div class="result-toolbar">
				<h1 id="result-title">正在查找酒店</h1>
				<select id="sort-select">
					<option value="value">性价比排序</option>
					<option value="priceAsc">价格从低到高</option>
					<option value="priceDesc">价格从高到低</option>
					<option value="rating">评分优先</option>
				</select>
			</div>
			<div class="ai-search-row">
				<div id="ai-hotel-note" class="ai-note"><i class="fa fa-magic"></i> 点击右侧按钮后，由 AI 查找酒店和详情网址。</div>
				<button id="ai-find-hotels-btn" type="button"><i class="fa fa-bolt"></i> AI查找酒店</button>
			</div>
			<div id="hotel-list" class="hotel-list"></div>
		</section>
	</main>

	<script src="{% static 'js/hotel_search.js' %}"></script>
</body>
</html>
